name: Publish NuGet

on:
  workflow_dispatch:
  push:
    branches: [master]
    paths:
      - 'KeySharp/KeySharp.csproj'

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Build
        working-directory: KeySharp
        run: dotnet build -c Release

      - name: Pack
        working-directory: KeySharp
        run: dotnet pack -c Release --no-build -o out

      - name: Push to NuGet
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
        working-directory: KeySharp
        run: |
          if [ -z "$NUGET_API_KEY" ]; then
            echo "ERROR: NUGET_API_KEY secret is not set or is empty"
            exit 1
          fi
          dotnet nuget push out/*.nupkg --api-key "$NUGET_API_KEY" --source https://api.nuget.org/v3/index.json --skip-duplicate
